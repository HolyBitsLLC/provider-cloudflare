name: Build and Push Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: |
          mkdir -p _output/bin/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o _output/bin/linux_amd64/provider ./cmd/provider/

  image:
    name: Build and Push Container Image
    needs: [ci]
    runs-on:
      - self-hosted
      - linux
      - x64
      - krubecible
      - holybits-shared
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build provider binary
        run: |
          mkdir -p cluster/images/provider-cloudflare/bin/linux_amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o cluster/images/provider-cloudflare/bin/linux_amd64/provider ./cmd/provider/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: harbor.dittmanfamily.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: harbor.dittmanfamily.com/holybitsllc/provider-cloudflare
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cluster/images/provider-cloudflare
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGETOS=linux
            TARGETARCH=amd64
            TERRAFORM_VERSION=1.5.7
            TERRAFORM_PROVIDER_SOURCE=cloudflare/cloudflare
            TERRAFORM_PROVIDER_VERSION=4.52.6
            TERRAFORM_PROVIDER_DOWNLOAD_NAME=terraform-provider-cloudflare
            TERRAFORM_NATIVE_PROVIDER_BINARY=terraform-provider-cloudflare_v4.52.6
            TERRAFORM_PROVIDER_DOWNLOAD_URL_PREFIX=https://github.com/cloudflare/terraform-provider-cloudflare/releases/download/v4.52.6
